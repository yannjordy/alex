<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alex</title>
  <base href="/alex/">
  <style>
    body { margin: 0; padding: 0; background: #0A0A0F; }
    loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: #444; font-family: sans-serif; }
  </style>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('flutter-first-frame', function () {
        navigator.serviceWorker.register('/alex/flutter_service_worker.js');
      });
    }
  </script>
</head>
<body>
  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function () {
      _flutter.loader.load({
        serviceWorkerSettings: { serviceWorkerVersion: '' }
      });
    });
  </script>
</body>
</html>
